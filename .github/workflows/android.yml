name: Android CI

on:
  push:
    paths:
      - '.github/workflows/android.yml'
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - 'settings.gradle.kts'
      - 'gradlew'
      - 'gradlew.bat'
      - 'keystore/**'
    branches-ignore:
      - 'wip/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.set_sha.outputs.short_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.4.1'
          cache-read-only: false

      - name: Build Release APK
        run: gradle --no-daemon --stacktrace --build-cache assembleRelease

      - name: Set short SHA
        id: set_sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Rename APK with commit hash
        run: |
          mkdir -p app/build/outputs/apk/release/final
          cp app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/final/Famy-release-${{ steps.set_sha.outputs.short_sha }}.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v7
        with:
          name: Famy-release-${{ steps.set_sha.outputs.short_sha }}
          path: app/build/outputs/apk/release/final/Famy-release-${{ steps.set_sha.outputs.short_sha }}.apk
          if-no-files-found: error
